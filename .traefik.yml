displayName: Webhooks
summary: >-
  Sends HTTP POST webhooks with JSON payloads when requests match URL, method,
  and optional body rules. Supports before and after upstream execution.
type: middleware
import: github.com/joaovictorlouro/traefik-plugin-webhooks
compatibility: ">=2.10.0"
testData:
  webhookMode: before_request
  webhookIncludeBody: true
  webhookIncludeHeaders: true
  rules:
    - urlRegex: "^https://app\\.example\\.com/api/.*"
      method: POST
      bodyRegex: "checkout"
      webhookUrl: https://hooks.example.com/notify
